{% extends "base.html" %}

{% block title %}Login - NetBox{% endblock %}

{% block content %}
<div class="container">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <div class="links">
        <a href="{% url 'register' %}">Create an account</a>
    </div>
</div>
{% endblock %}
