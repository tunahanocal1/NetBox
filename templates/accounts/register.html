{% extends 'base.html' %}

{% block content %}

<h2>Register</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <!-- İnce uzun kayıt butonu -->
    <input type="submit" value="Register" style="
        width: 100%;
        padding: 0.6rem;
        border-radius: 0.5rem;
        border: none;
        background-color: #3b82f6;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
    ">
</form>

<!-- Login link -->
<p style="margin-top: 1rem; text-align:center;">
    Already have an account?
    <a href="{% url 'login' %}" style="
        color: #3b82f6;
        text-decoration: none;
        font-weight: 500;
    ">
        Login
    </a>
</p>

{% endblock %}
