{% extends "base.html" %}

{% block content %}

<div style="
    position:relative;
    height:100vh;
    color:white;
    overflow:hidden;
">

    <!-- BACKGROUND IMAGE -->
    {% if book.covers %}
    <div style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:url('{{ book.covers.0 }}') center/cover no-repeat;
        filter: blur(2px);
        transform: scale(1.05);
    "></div>
    {% endif %}

    <!-- DARK OVERLAY -->
    <div style="
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
    "></div>

    <!-- CONTENT -->
    <div style="
        position:relative;
        z-index:2;
        max-width:600px;
        padding:80px;
    ">

        <h1 style="font-size:48px; margin-bottom:10px;">
            {{ book.title }}
        </h1>

        <p style="color:#aaa; margin-bottom:20px;">
            {{ book.authors|join:", " }}
        </p>

        {% if book.description %}
        <p style="line-height:1.6; margin-bottom:30px;">
            {{ book.description|truncatewords:40 }}
        </p>
        {% endif %}

        <!-- BUTTONS -->
        <div style="display:flex; gap:15px;">
            <a href="#" style="
                background:#00c853;
                padding:12px 25px;
                border-radius:8px;
                text-decoration:none;
                color:white;
                font-weight:bold;
            ">
                ▶ READ
            </a>

            <a href="javascript:history.back()" style="
                border:1px solid #aaa;
                padding:12px 25px;
                border-radius:8px;
                text-decoration:none;
                color:white;
            ">
                ⬅ BACK
            </a>
        </div>

    </div>

</div>

{% endblock %}
