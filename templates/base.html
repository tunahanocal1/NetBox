<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>

    <style>
        /* GLOBAL STYLES */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f1115;
            color: #e5e7eb;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background-color: #1a1c23;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .logo:hover {
            color: #60a5fa;
        }

        /* SEARCH */
        .search-form {
            flex: 1;
            display: flex;
            justify-content: center;
            margin: 0 2rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #21232a;
            border-radius: 999px;
            padding: 0.4rem 0.8rem;
            width: 100%;
            max-width: 400px;
            transition: background 0.2s ease;
        }

        .search-box:hover {
            background: #2a2c36;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: #e5e7eb;
            padding: 0.6rem 0.5rem;
            font-size: 0.95rem;
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
        }

        .search-btn:hover {
            color: #ffffff;
        }

        /* NAV */
        nav a {
            margin-left: 1rem;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            transition: background 0.2s ease, color 0.2s ease;
        }

        nav a:hover {
            background-color: #2a2c36;
        }

        /* MAIN */
        main {
            padding: 2rem;
            max-width: 900px;
            margin: auto;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: 0.85rem;
            color: #6b7280;
        }

    </style>
</head>

<body>

<header>
    <a href="{% url 'home' %}" class="logo">NetBox</a>

    {% if user.is_authenticated %}
    <form action="{% url 'search' %}" method="GET" class="search-form">
        <div class="search-box">
            <input type="text" name="q" placeholder="Search..." class="search-input">
            <button type="submit" class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </form>
    {% endif %}

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    &copy; 2026 NetBox. All rights reserved.
</footer>

</body>
</html>
