<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NetBox{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Global Reset */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

        /* Dark Theme Colors */
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
        }

        a { color: #bb86fc; text-decoration: none; }

        /* Container */
        .container {
            max-width: 400px;
            margin: 5% auto;
            padding: 2rem;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1, h2 {
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 5px;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }

        button {
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            background-color: #bb86fc;
            color: #121212;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #9b63d0;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
        }

    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
