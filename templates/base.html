<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>
    <style>
        /* Dark Theme + Minimal Tasarım */

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* Container */
        .home-container {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        /* Welcome */
        .welcome-box h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .welcome-box p {
            color: #aaa;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            flex: 1;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        /* Books */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .book-card {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .book-card:hover {
            transform: scale(1.05);
        }

        .book-card img {
            width: 100%;
            border-radius: 10px;
        }

        .book-card p {
            margin-top: 8px;
            font-size: 14px;
        }

        /* Buttons */
        .actions {
            margin-top: 40px;
        }

        .add-btn, .explore-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn {
            background: #00c030;
            color: white;
        }

        .add-btn:hover {
            background: #00a828;
        }

        .explore-btn {
            background: #2a2a2a;
            color: white;
        }

        .explore-btn:hover {
            background: #3a3a3a;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #333;
            background-color: #1c1c1c;
        }

        /* Başlık */
        .navbar-brand {
            font-size: 2rem;
            font-weight: bold;
            color:  #3b82f6;
            text-decoration: none;
        }

        .navbar-brand:hover {
            color: #fefefe;
        }

        nav a {
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            background-color: #1f2937;
            color: #fff;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        nav a:hover {
            background-color: #374151;
        }

        main {
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }

        h1, h2 {
            color: #ffffff;
        }

        /* Minimal Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: #1c1c1c;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input[type="text"], input[type="password"], input[type="email"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #2a2a2a;
            color: #fff;
        }

        input[type="submit"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #3b82f6;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        input[type="submit"]:hover {
            background-color: #2563eb;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <!-- Başlık tıklanabilir -->
        <a href="{% url 'home' %}" class="navbar-brand">NetBox</a>

        <!-- Navbar: kullanıcı durumu kontrolü -->
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}">
                    {{ user.username }}
                </a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        &copy; 2026 NetBox. All rights reserved.
    </footer>
</body>
</html>
