<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; /* Tam siyah arka plan */
            color: #fff;
        }
        a { text-decoration: none; color: inherit; transition: color 0.2s; }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 4rem; /* Daha geniş padding */
            background-color: rgba(0, 0, 0, 0.8); /* Şeffaf siyah header */
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6; /* Mavi logo */
        }
        .logo:hover { color: #fff; }

        /* SEARCH (Sadece giriş yapmış kullanıcılar için) */
        .search-form {
            flex: 1;
            display: flex;
            justify-content: center;
            margin: 0 2rem;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #1b1b1b;
            border-radius: 999px;
            padding: 0.4rem 1rem;
            width: 100%;
            max-width: 400px;
        }
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: #fff;
            padding: 0.6rem;
            outline: none;
        }
        .search-input::placeholder { color: #8b949e; }
        .search-btn { background: none; border: none; cursor: pointer; color: #8b949e; }
        .search-btn:hover { color: #fff; }

        /* NAV */
        nav { display: flex; align-items: center; gap: 1rem; }
        nav a {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }
        nav a:hover { background-color: #21262d; }

        /* MAIN CONTENT AREA */
        main {
            padding-top: 80px; /* Header yüksekliği kadar boşluk */
            min-height: calc(100vh - 70px); /* Footer'ı aşağıda tutmak için */
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: #8b949e;
            background-color: #000;
            border-top: 1px solid #1b1b1b;
        }
    </style>
</head>
<body>

<header>
    <a href="{% url 'home' %}" class="logo">NetBox</a>

    {% if user.is_authenticated %}
    <form action="{% url 'search' %}" method="GET" class="search-form">
        <div class="search-box">
            <input type="text" name="q" placeholder="Search books..." class="search-input">
            <button type="submit" class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </form>
    {% endif %}

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
            <a href="{% url 'logout' %}" style="color: #ff4d4d;">Logout</a>
        {% else %}
            <a href="#" id="openLoginNav">Login</a>
            <a href="#" id="openRegisterNav" style="background-color: #3b82f6; color: white;">Register</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    &copy; 2026 NetBox. All rights reserved.
</footer>

</body>
</html>
