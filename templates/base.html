<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background-color: #1c1c1c;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
        }

        /* SEARCH BAR */
        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .search-form {
            display: flex;
            align-items: center;
            width: 60%;
            max-width: 500px;
            background: #2a2a2a;
            border-radius: 999px;
            padding: 6px 12px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 14px;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            display: flex;
            align-items: center;
        }

        .search-btn:hover {
            color: #fff;
        }

        /* NAV */
        nav a {
            margin-left: 10px;
            padding: 8px 14px;
            background-color: #1f2937;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            background-color: #374151;
        }

        main {
            padding: 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <!-- LOGO -->
    <a href="{% url 'home' %}" class="logo">NetBox</a>

    <!-- SEARCH (SADECE LOGIN OLUNCA) -->
    {% if user.is_authenticated %}
    <div class="search-container">
        <form action="{% url 'search' %}" method="GET" class="search-form">
            <input type="text" name="q" placeholder="Type here to search.." class="search-input">
            <button type="submit" class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" 
                     width="18" height="18" 
                     fill="none" 
                     stroke="currentColor" 
                     stroke-width="2" 
                     viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </form>
    </div>
    {% endif %}

    <!-- NAV -->
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    &copy; 2026 NetBox. All rights reserved.
</footer>

</body>
</html>
